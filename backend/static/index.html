<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 Mobile Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .chat-container { height: calc(100vh - 200px); overflow-y: auto; }
        .message-bubble { max-width: 85%; border-radius: 16px; margin-bottom: 12px; padding: 14px; line-height: 1.5; }
        .user-bubble { background: #2563eb; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .assistant-bubble { background: #f3f4f6; color: #1f2937; margin-right: auto; border-bottom-left-radius: 4px; border: 1px solid #e5e7eb; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [messages, setMessages] = useState([
                { user: "", assistant: "Hello! I'm your Gemma 4 Mobile Agent. I'm ready to help with your phone, search the web, or access your files.", trace: [], traceSummary: [], mode: "system", requestId: "welcome", requestDurationMs: null, showRawTrace: false }
            ]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState({ actor_online: false, actor_model: "Checking..." });
            const [showTrace, setShowTrace] = useState(true);
            const [traceFilter, setTraceFilter] = useState("all");
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            useEffect(() => {
                fetch("/health")
                    .then((res) => res.json())
                    .then((data) => setStatus(data))
                    .catch(() => setStatus({ actor_online: false, actor_model: "Offline" }));
            }, []);

            const sendMessage = async (text) => {
                const msg = text || input;
                if (!msg.trim() || loading) return;
                
                const userMessage = msg;
                setInput("");
                setLoading(true);
                
                setMessages(prev => [...prev, { user: userMessage, assistant: "Thinking...", trace: [], traceSummary: [], mode: "pending", requestId: `pending-${Date.now()}`, requestDurationMs: null, showRawTrace: false }]);

                try {
                    const history = messages.filter(m => m.user).map(m => ({ user: m.user, assistant: m.assistant }));
                    const res = await fetch("/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: userMessage, history })
                    });
                    const data = await res.json();
                    
                    setMessages(prev => {
                        const updated = [...prev];
                        updated[updated.length - 1].assistant = data.response;
                        updated[updated.length - 1].trace = data.trace || [];
                        updated[updated.length - 1].traceSummary = data.trace_summary || [];
                        updated[updated.length - 1].mode = data.mode || "agentic";
                        updated[updated.length - 1].requestId = data.request_id || updated[updated.length - 1].requestId;
                        updated[updated.length - 1].requestDurationMs = data.request_duration_ms;
                        return updated;
                    });
                } catch (error) {
                    setMessages(prev => {
                        const updated = [...prev];
                        updated[updated.length - 1].assistant = "⚠️ Error connecting to the agent. Make sure the server is running.";
                        updated[updated.length - 1].trace = [{ type: "exception", message: String(error) }];
                        updated[updated.length - 1].traceSummary = [`exception: ${String(error)}`];
                        updated[updated.length - 1].mode = "error";
                        updated[updated.length - 1].requestDurationMs = null;
                        return updated;
                    });
                } finally {
                    setLoading(false);
                }
            };

            const quickActions = [
                { icon: "🔋", label: "Battery", cmd: "battery" },
                { icon: "📍", label: "Location", cmd: "get location" },
                { icon: "🔦", label: "Torch", cmd: "flashlight" },
                { icon: "🔊", label: "Speak", cmd: "say Hello, I am Gemma!" },
                { icon: "📋", label: "Clipboard", cmd: "get clipboard" },
                { icon: "🔎", label: "Search", cmd: "Search the web for today news" },
                { icon: "📂", label: "Files", cmd: "List files in my storage downloads" },
                { icon: "📳", label: "Vibrate", cmd: "vibrate" }
            ];

            const visibleTrace = (trace) => {
                if (!trace || traceFilter === "all") return trace || [];
                return trace.filter(item => item.type === traceFilter);
            };

            const getTraceMeta = (message) => {
                const trace = message.trace || [];
                const firstOperational = trace.find(item => item.type !== "request") || null;
                return {
                    route: firstOperational?.route || firstOperational?.tool || message.mode || "agentic",
                    family: firstOperational?.family || (firstOperational?.type === "fast_path_search" ? "search" : null),
                    deterministic: Boolean(firstOperational?.deterministic),
                };
            };

            const toggleRawTrace = (index) => {
                setMessages(prev => {
                    const updated = [...prev];
                    updated[index] = {
                        ...updated[index],
                        showRawTrace: !updated[index].showRawTrace,
                    };
                    return updated;
                });
            };


            return (
                <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-2xl border-x border-slate-200">
                    <header className="bg-blue-700 text-white p-5 shadow-md sticky top-0 z-10 flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-extrabold tracking-tight">GEMMA 4 MOBILE</h1>
                            <div className="flex items-center gap-1.5 mt-0.5">
                                <span className="h-2 w-2 bg-green-400 rounded-full"></span>
                                <p className="text-[10px] uppercase font-bold opacity-80 tracking-widest text-green-100">
                                    {status.actor_online ? `${status.actor_model} Online` : "Engine Offline"}
                                </p>
                            </div>
                        </div>
                        <div className="p-2 bg-blue-800 rounded-lg">
                            <span className="text-xl">🤖</span>
                        </div>
                    </header>

                    <div className="px-4 py-2 bg-slate-100 border-b border-slate-200 flex items-center justify-between text-[11px] uppercase tracking-wider font-semibold text-slate-600">
                        <span>{showTrace ? "Trace Visible" : "Trace Hidden"}</span>
                        <div className="flex items-center gap-2">
                            <select
                                value={traceFilter}
                                onChange={(e) => setTraceFilter(e.target.value)}
                                className="rounded-full border border-slate-300 bg-white px-3 py-1 text-[11px] font-bold text-slate-700"
                            >
                                <option value="all">All</option>
                                <option value="request">Request</option>
                                <option value="fast_path_tool">Fast Path</option>
                                <option value="fast_path_search">Fast Search</option>
                                <option value="state_transition">State</option>
                                <option value="runtime_budget">Budget</option>
                                <option value="actor">Actor</option>
                                <option value="tool_parse">Tool Parse</option>
                                <option value="critic">Critic</option>
                                <option value="tool_execution">Tool Exec</option>
                                <option value="direct_fallback">Fallback</option>
                                <option value="answer_cleanup">Cleanup</option>
                                <option value="exception">Exception</option>
                            </select>
                            <button
                                onClick={() => setShowTrace(prev => !prev)}
                                className="rounded-full border border-slate-300 bg-white px-3 py-1 text-[11px] font-bold text-slate-700"
                            >
                                {showTrace ? "Hide Debug" : "Show Debug"}
                            </button>
                        </div>
                    </div>

                    <main className="chat-container p-4 flex-1 bg-white">
                        {messages.map((m, i) => (
                            <div key={i} className="animate-fade-in">
                                {m.user && (
                                    <div className="message-bubble user-bubble shadow-sm">
                                        {m.user}
                                    </div>
                                )}
                                <div className="message-bubble assistant-bubble shadow-sm text-sm whitespace-pre-wrap">
                                    {m.assistant}
                                </div>
                                {showTrace && m.traceSummary && m.traceSummary.length > 0 && (
                                    <div className="mb-3 rounded-2xl border border-amber-200 bg-amber-50 p-3 text-xs text-amber-900">
                                        <div className="mb-2 flex items-center justify-between gap-2">
                                            <div>
                                                <div className="font-semibold uppercase tracking-wide text-amber-700">Trace Summary</div>
                                                <div className="mt-2 flex flex-wrap gap-2">
                                                    <span className="rounded-full bg-white px-2.5 py-1 font-bold uppercase tracking-wide text-[10px] text-slate-700 border border-amber-200">
                                                        Mode: {m.mode || "agentic"}
                                                    </span>
                                                    <span className="rounded-full bg-white px-2.5 py-1 font-bold uppercase tracking-wide text-[10px] text-slate-700 border border-amber-200">
                                                        Route: {getTraceMeta(m).route}
                                                    </span>
                                                    {getTraceMeta(m).family && (
                                                        <span className="rounded-full bg-white px-2.5 py-1 font-bold uppercase tracking-wide text-[10px] text-slate-700 border border-amber-200">
                                                            Family: {getTraceMeta(m).family}
                                                        </span>
                                                    )}
                                                    {getTraceMeta(m).deterministic && (
                                                        <span className="rounded-full bg-emerald-100 px-2.5 py-1 font-bold uppercase tracking-wide text-[10px] text-emerald-800 border border-emerald-200">
                                                            Deterministic
                                                        </span>
                                                    )}
                                                </div>
                                                {m.requestDurationMs !== null && (
                                                    <div className="mt-1 text-[11px] font-semibold uppercase tracking-wide text-amber-700">
                                                        Request Duration: {m.requestDurationMs}ms
                                                    </div>
                                                )}
                                            </div>
                                            {visibleTrace(m.trace).length > 0 && (
                                                <button
                                                    onClick={() => toggleRawTrace(i)}
                                                    className="rounded-full border border-amber-300 bg-white px-3 py-1 text-[11px] font-bold uppercase tracking-wide text-amber-800"
                                                >
                                                    {m.showRawTrace ? "Hide Raw Trace" : "Show Raw Trace"}
                                                </button>
                                            )}
                                        </div>
                                        <div className="space-y-1">
                                            {m.traceSummary.map((line, idx) => (
                                                <div key={idx} className="whitespace-pre-wrap">{line}</div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {showTrace && m.showRawTrace && visibleTrace(m.trace).length > 0 && (
                                    <div className="mb-4 rounded-2xl border border-slate-200 bg-slate-50 p-3 text-xs text-slate-700">
                                        <div className="mb-2 flex items-center justify-between font-semibold uppercase tracking-wide text-slate-500">
                                            <span>{m.mode || "agentic"} trace</span>
                                            <span>{m.requestId || "local"}</span>
                                        </div>
                                        <div className="space-y-2">
                                            {visibleTrace(m.trace).map((item, idx) => (
                                                <pre key={idx} className="whitespace-pre-wrap rounded-xl bg-white p-2 border border-slate-200 overflow-x-auto">{JSON.stringify(item, null, 2)}</pre>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                        <div ref={chatEndRef}></div>
                    </main>

                    <div className="px-4 py-3 bg-slate-50 border-t border-slate-100 flex gap-2 overflow-x-auto no-scrollbar scroll-smooth">
                        {quickActions.map((action, i) => (
                            <button 
                                key={i}
                                onClick={() => sendMessage(action.cmd)}
                                className="bg-white border border-slate-200 rounded-xl px-4 py-2 text-xs font-semibold whitespace-nowrap shadow-sm hover:border-blue-400 hover:text-blue-600 transition-all flex items-center gap-2 active:scale-95"
                            >
                                <span>{action.icon}</span> {action.label}
                            </button>
                        ))}
                    </div>

                    <footer className="p-4 border-t bg-white sticky bottom-0">
                        <div className="flex gap-2 items-center bg-slate-100 p-1.5 rounded-2xl border border-slate-200 focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-100 transition-all">
                            <input 
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === "Enter" && sendMessage()}
                                placeholder="Command your phone..."
                                className="flex-1 bg-transparent px-4 py-2 text-sm focus:outline-none"
                                disabled={loading}
                            />
                            <button 
                                onClick={() => sendMessage()}
                                className="bg-blue-600 text-white p-2.5 rounded-xl hover:bg-blue-700 disabled:opacity-50 shadow-lg shadow-blue-200 transition-all active:scale-90"
                                disabled={loading || !input.trim()}
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5">
                                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                                </svg>
                            </button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
