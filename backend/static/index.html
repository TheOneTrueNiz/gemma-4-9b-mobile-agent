<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 Mobile Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #07131b;
            --bg-1: #0c2430;
            --bg-2: #10394a;
            --panel: rgba(8, 20, 28, 0.78);
            --panel-strong: rgba(5, 12, 18, 0.9);
            --line: rgba(139, 208, 255, 0.18);
            --line-strong: rgba(139, 208, 255, 0.35);
            --text: #e7f6ff;
            --muted: #87a8b8;
            --accent: #6ee7d2;
            --accent-2: #f8b84e;
            --accent-3: #6bb8ff;
            --ok: #7cf29a;
            --danger: #ff9c8c;
            --shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(110, 231, 210, 0.14), transparent 28%),
                radial-gradient(circle at top right, rgba(107, 184, 255, 0.18), transparent 32%),
                linear-gradient(160deg, var(--bg-0), var(--bg-1) 48%, var(--bg-2));
            color: var(--text);
            font-family: "Space Grotesk", sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: radial-gradient(circle at center, black 50%, transparent 88%);
            pointer-events: none;
        }

        #root {
            min-height: 100vh;
        }

        .app-shell {
            min-height: 100vh;
            max-width: 460px;
            margin: 0 auto;
            padding: 20px 14px 16px;
            position: relative;
        }

        .app-shell::before,
        .app-shell::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(18px);
            opacity: 0.45;
            pointer-events: none;
        }

        .app-shell::before {
            width: 144px;
            height: 144px;
            background: rgba(110, 231, 210, 0.2);
            top: 44px;
            right: -18px;
        }

        .app-shell::after {
            width: 120px;
            height: 120px;
            background: rgba(248, 184, 78, 0.14);
            bottom: 148px;
            left: -28px;
        }

        .glass-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .glass-strong {
            background: var(--panel-strong);
            border: 1px solid var(--line-strong);
        }

        .mono {
            font-family: "IBM Plex Mono", monospace;
        }

        .chat-container {
            height: calc(100vh - 310px);
            min-height: 360px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .top-console {
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .launcher-rail {
            position: fixed;
            left: 50%;
            bottom: 124px;
            z-index: 40;
            width: min(428px, calc(100vw - 20px));
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .rail-button {
            border-radius: 22px;
            border: 1px solid rgba(139, 208, 255, 0.18);
            background: linear-gradient(180deg, rgba(11, 24, 34, 0.96), rgba(7, 16, 23, 0.96));
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(18px);
            padding: 14px 12px;
            text-align: left;
            transition: transform 160ms ease, border-color 160ms ease;
        }

        .rail-button:hover {
            border-color: rgba(110, 231, 210, 0.35);
        }

        .rail-button:active {
            transform: scale(0.97);
        }

        .sheet-scrim {
            position: fixed;
            inset: 0;
            z-index: 48;
            background: rgba(3, 9, 14, 0.52);
            backdrop-filter: blur(8px);
        }

        .bottom-sheet {
            position: fixed;
            left: 50%;
            bottom: 96px;
            z-index: 50;
            width: min(428px, calc(100vw - 18px));
            transform: translateX(-50%);
            border-radius: 28px 28px 18px 18px;
            border: 1px solid rgba(139, 208, 255, 0.18);
            background: linear-gradient(180deg, rgba(8, 20, 29, 0.98), rgba(4, 11, 17, 0.98));
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(22px);
            padding: 14px;
            animation: sheetRise 220ms ease-out;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
        }

        .sheet-handle {
            width: 72px;
            height: 5px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            margin: 2px auto 14px;
        }

        .sheet-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .surface-card {
            border-radius: 24px;
            border: 1px solid rgba(139, 208, 255, 0.12);
            background: linear-gradient(180deg, rgba(16, 36, 47, 0.88), rgba(7, 17, 24, 0.92));
            padding: 16px;
        }

        .surface-card.wide {
            grid-column: span 2;
        }

        .app-pill {
            border-radius: 18px;
            border: 1px solid rgba(139, 208, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            padding: 12px;
            text-align: left;
            transition: transform 160ms ease, border-color 160ms ease;
        }

        .app-pill:active {
            transform: scale(0.98);
        }

        .app-pill:hover {
            border-color: rgba(110, 231, 210, 0.28);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .app-tile {
            border-radius: 24px;
            border: 1px solid rgba(139, 208, 255, 0.12);
            background: linear-gradient(180deg, rgba(18, 39, 51, 0.92), rgba(7, 17, 24, 0.94));
            padding: 16px;
            text-align: left;
            transition: transform 160ms ease, border-color 160ms ease;
        }

        .app-tile:active {
            transform: scale(0.98);
        }

        .app-tile:hover {
            border-color: rgba(107, 184, 255, 0.32);
        }

        .sheet-card {
            border-radius: 22px;
            border: 1px solid rgba(139, 208, 255, 0.12);
            background: linear-gradient(180deg, rgba(17, 36, 47, 0.88), rgba(8, 18, 25, 0.94));
            padding: 14px;
        }

        .message-bubble {
            max-width: 92%;
            margin-bottom: 12px;
            padding: 14px 16px;
            line-height: 1.55;
            border-radius: 22px;
            animation: riseIn 260ms ease-out;
        }

        .user-bubble {
            margin-left: auto;
            color: #051017;
            background: linear-gradient(135deg, #9bf6e5, #71baff);
            border-bottom-right-radius: 6px;
            box-shadow: 0 10px 28px rgba(107, 184, 255, 0.22);
        }

        .assistant-bubble {
            margin-right: auto;
            background: linear-gradient(180deg, rgba(13, 29, 39, 0.95), rgba(8, 19, 27, 0.92));
            color: var(--text);
            border: 1px solid rgba(139, 208, 255, 0.16);
            border-bottom-left-radius: 6px;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.06);
            padding: 8px 12px;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.3fr 0.9fr;
            gap: 12px;
        }

        .orb {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            box-shadow: 0 0 18px currentColor;
        }

        .action-card {
            min-width: 116px;
            border-radius: 20px;
            border: 1px solid rgba(139, 208, 255, 0.12);
            background: linear-gradient(180deg, rgba(18, 40, 53, 0.82), rgba(8, 18, 25, 0.92));
            padding: 14px;
            text-align: left;
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .action-card:active {
            transform: scale(0.97);
        }

        .action-card:hover {
            border-color: rgba(110, 231, 210, 0.42);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
        }

        .trace-panel {
            border-radius: 22px;
            border: 1px solid rgba(248, 184, 78, 0.22);
            background: linear-gradient(180deg, rgba(60, 42, 14, 0.5), rgba(28, 23, 12, 0.52));
        }

        .raw-trace {
            border-radius: 18px;
            border: 1px solid rgba(139, 208, 255, 0.12);
            background: rgba(4, 11, 16, 0.78);
        }

        .command-bar {
            background: linear-gradient(180deg, rgba(9, 20, 29, 0.95), rgba(6, 14, 21, 0.95));
            border: 1px solid rgba(139, 208, 255, 0.16);
            border-radius: 24px;
            box-shadow: var(--shadow);
            position: sticky;
            bottom: 0;
            z-index: 45;
        }

        .send-button {
            background: linear-gradient(135deg, #6ee7d2, #6bb8ff);
            color: #031019;
            box-shadow: 0 14px 26px rgba(107, 184, 255, 0.24);
        }

        .send-button:disabled {
            opacity: 0.45;
            box-shadow: none;
        }

        .stagger {
            animation: riseIn 360ms ease-out;
        }

        .stagger-2 {
            animation: riseIn 460ms ease-out;
        }

        .stagger-3 {
            animation: riseIn 560ms ease-out;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes sheetRise {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(139, 208, 255, 0.32);
            border-radius: 999px;
        }

        @media (max-width: 480px) {
            .app-shell {
                padding: 14px 10px 12px;
            }

            .hero-grid {
                grid-template-columns: 1fr;
            }

            .chat-container {
                height: calc(100vh - 286px);
                min-height: 320px;
            }

            .launcher-rail {
                width: calc(100vw - 16px);
                bottom: 110px;
                gap: 8px;
            }

            .rail-button {
                padding: 12px 10px;
            }

            .bottom-sheet {
                width: calc(100vw - 12px);
                bottom: 84px;
                max-height: calc(100vh - 132px);
            }

            .sheet-grid {
                grid-template-columns: 1fr;
            }

            .home-grid {
                grid-template-columns: 1fr;
            }

            .surface-card.wide {
                grid-column: span 1;
            }

            .app-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [messages, setMessages] = useState([
                {
                    user: "",
                    assistant: "Gemma Mobile is online. Ask for device actions, deterministic utilities, memory, or local agent work.",
                    trace: [],
                    traceSummary: [],
                    mode: "system",
                    requestId: "welcome",
                    requestDurationMs: null,
                    showRawTrace: false
                }
            ]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState({ actor_online: false, actor_model: "Checking..." });
            const [showTrace, setShowTrace] = useState(true);
            const [traceFilter, setTraceFilter] = useState("all");
            const [activeSheet, setActiveSheet] = useState(null);
            const [surfaceMode, setSurfaceMode] = useState("home");
            const [homeClock, setHomeClock] = useState("");
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            useEffect(() => {
                fetch("/health")
                    .then((res) => res.json())
                    .then((data) => setStatus(data))
                    .catch(() => setStatus({ actor_online: false, actor_model: "Offline" }));
            }, []);

            useEffect(() => {
                const updateClock = () => {
                    const now = new Date();
                    setHomeClock(now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }));
                };
                updateClock();
                const timer = setInterval(updateClock, 1000 * 30);
                return () => clearInterval(timer);
            }, []);

            const sendMessage = async (text) => {
                const msg = text || input;
                if (!msg.trim() || loading) return;

                const userMessage = msg;
                setInput("");
                setLoading(true);
                setMessages(prev => [
                    ...prev,
                    {
                        user: userMessage,
                        assistant: "Working...",
                        trace: [],
                        traceSummary: [],
                        mode: "pending",
                        requestId: `pending-${Date.now()}`,
                        requestDurationMs: null,
                        showRawTrace: false
                    }
                ]);

                try {
                    const history = messages.filter(m => m.user).map(m => ({ user: m.user, assistant: m.assistant }));
                    const res = await fetch("/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: userMessage, history })
                    });
                    const data = await res.json();

                    setMessages(prev => {
                        const updated = [...prev];
                        updated[updated.length - 1].assistant = data.response;
                        updated[updated.length - 1].trace = data.trace || [];
                        updated[updated.length - 1].traceSummary = data.trace_summary || [];
                        updated[updated.length - 1].mode = data.mode || "agentic";
                        updated[updated.length - 1].requestId = data.request_id || updated[updated.length - 1].requestId;
                        updated[updated.length - 1].requestDurationMs = data.request_duration_ms;
                        return updated;
                    });
                } catch (error) {
                    setMessages(prev => {
                        const updated = [...prev];
                        updated[updated.length - 1].assistant = "Connection failed. Check the backend and actor engine.";
                        updated[updated.length - 1].trace = [{ type: "exception", message: String(error) }];
                        updated[updated.length - 1].traceSummary = [`exception: ${String(error)}`];
                        updated[updated.length - 1].mode = "error";
                        updated[updated.length - 1].requestDurationMs = null;
                        return updated;
                    });
                } finally {
                    setLoading(false);
                }
            };

            const quickActions = [
                { glyph: "01", label: "Power Check", hint: "Battery", cmd: "battery", group: "device" },
                { glyph: "02", label: "Field Scan", hint: "Location", cmd: "get location", group: "device" },
                { glyph: "03", label: "Torch", hint: "Flashlight", cmd: "flashlight", group: "device" },
                { glyph: "04", label: "Clipboard", hint: "Current copy", cmd: "get clipboard", group: "device" },
                { glyph: "05", label: "Math", hint: "2 + 2 * 5", cmd: "what is 2 + 2 * 5?", group: "utility" },
                { glyph: "06", label: "UTC Clock", hint: "Current UTC", cmd: "what time is it in utc", group: "utility" },
                { glyph: "07", label: "Convert", hint: "5 miles to km", cmd: "convert 5 miles to km", group: "utility" },
                { glyph: "08", label: "Utility", hint: "Uppercase", cmd: "uppercase hello phone agent", group: "utility" }
            ];

            const groupedActions = {
                device: quickActions.filter(action => action.group === "device"),
                utility: quickActions.filter(action => action.group === "utility"),
            };
            const appTiles = [
                {
                    key: "device",
                    title: "Device Deck",
                    subtitle: "Battery, location, clipboard, torch",
                    badge: "OPS",
                    command: "battery",
                },
                {
                    key: "utility",
                    title: "Utility Lab",
                    subtitle: "Math, time, conversion, text tools",
                    badge: "TOOLS",
                    command: "convert 5 miles to km",
                },
                {
                    key: "memory",
                    title: "Memory Vault",
                    subtitle: "Recall and reinforce stored context",
                    badge: "MEM",
                    command: "recall what you know about this project",
                },
                {
                    key: "research",
                    title: "Research Port",
                    subtitle: "Search the live web from the launcher",
                    badge: "WEB",
                    command: "search the web for gemma mobile agent news",
                },
            ];

            const visibleTrace = (trace) => {
                if (!trace || traceFilter === "all") return trace || [];
                return trace.filter(item => item.type === traceFilter);
            };

            const getTraceMeta = (message) => {
                const trace = message.trace || [];
                const firstOperational = trace.find(item => item.type !== "request") || null;
                return {
                    route: firstOperational?.route || firstOperational?.tool || message.mode || "agentic",
                    family: firstOperational?.family || (firstOperational?.type === "fast_path_search" ? "search" : null),
                    deterministic: Boolean(firstOperational?.deterministic),
                };
            };

            const toggleRawTrace = (index) => {
                setMessages(prev => {
                    const updated = [...prev];
                    updated[index] = {
                        ...updated[index],
                        showRawTrace: !updated[index].showRawTrace,
                    };
                    return updated;
                });
            };

            const toggleSheet = (key) => {
                setActiveSheet(prev => prev === key ? null : key);
            };

            const lastMessage = messages[messages.length - 1];
            const lastRoute = getTraceMeta(lastMessage || {});
            const homeHighlights = [
                { label: "Runtime", value: status.actor_online ? "ONLINE" : "OFFLINE", accent: "text-emerald-300" },
                { label: "Mode", value: surfaceMode.toUpperCase(), accent: "text-cyan-200" },
                { label: "Route", value: (lastRoute.route || "standby").toUpperCase(), accent: "text-amber-200" },
                { label: "Clock", value: homeClock || "--:--", accent: "text-white" },
            ];

            return (
                <div className="app-shell">
                    <div className="space-y-4">
                        <section className="glass-panel rounded-[30px] p-4 stagger top-console">
                            <div className="flex items-start justify-between gap-4">
                                <div>
                                    <div className="chip mono text-[10px] text-cyan-100">
                                        <span className="orb" style={{ color: status.actor_online ? "var(--ok)" : "var(--danger)", background: "currentColor" }}></span>
                                        {status.actor_online ? "Actor Online" : "Actor Offline"}
                                    </div>
                                    <h1 className="mt-4 text-3xl font-bold tracking-[-0.04em] text-white">GEMMA MOBILE</h1>
                                    <p className="mt-2 max-w-[18rem] text-sm leading-6 text-slate-300">
                                        Local agent shell for phone control, deterministic utilities, memory, and traced execution.
                                    </p>
                                </div>
                                <div className="glass-strong rounded-[22px] px-4 py-3 text-right">
                                    <div className="mono text-[10px] uppercase tracking-[0.24em] text-cyan-200">Engine</div>
                                    <div className="mt-2 text-sm font-semibold text-white">{status.actor_model}</div>
                                    <div className="mt-3 mono text-[11px] uppercase tracking-[0.16em] text-slate-400">
                                        {loading ? "Busy" : "Idle"}
                                    </div>
                                </div>
                            </div>
                            <div className="mt-4 flex flex-wrap gap-2">
                                <button
                                    onClick={() => setSurfaceMode("home")}
                                    className="chip mono text-[10px] text-white"
                                    style={surfaceMode === "home" ? { background: "rgba(110, 231, 210, 0.18)", borderColor: "rgba(110, 231, 210, 0.32)" } : {}}
                                >
                                    Home Surface
                                </button>
                                <button
                                    onClick={() => setSurfaceMode("chat")}
                                    className="chip mono text-[10px] text-white"
                                    style={surfaceMode === "chat" ? { background: "rgba(107, 184, 255, 0.18)", borderColor: "rgba(107, 184, 255, 0.32)" } : {}}
                                >
                                    Chat Stream
                                </button>
                            </div>
                        </section>

                        {surfaceMode === "home" && (
                            <section className="glass-panel rounded-[28px] p-4 stagger-2">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Launcher Surface</div>
                                        <div className="mt-2 text-lg font-bold tracking-[-0.03em] text-white">Agent Home</div>
                                    </div>
                                    <div className="mono text-[11px] uppercase tracking-[0.16em] text-slate-400">Middle layer active</div>
                                </div>
                                <div className="home-grid mt-4">
                                    <div className="surface-card wide">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Runtime Snapshot</div>
                                        <div className="mt-3 text-2xl font-bold tracking-[-0.03em] text-white">
                                            {lastMessage?.mode === "pending" ? "Resolving task" : "Standing by"}
                                        </div>
                                        <div className="mt-2 text-sm leading-6 text-slate-300">
                                            {lastMessage?.assistant || "No prior turn yet."}
                                        </div>
                                    </div>
                                    <div className="surface-card wide">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">App Layer</div>
                                        <div className="app-grid mt-3">
                                            {appTiles.map((tile) => (
                                                <button key={tile.key} onClick={() => sendMessage(tile.command)} className="app-tile">
                                                    <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">{tile.badge}</div>
                                                    <div className="mt-3 text-xl font-bold tracking-[-0.03em] text-white">{tile.title}</div>
                                                    <div className="mt-2 text-sm leading-6 text-slate-300">{tile.subtitle}</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="surface-card wide">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-amber-200">Ambient Layer</div>
                                        <div className="mt-3 grid grid-cols-2 gap-3">
                                            {homeHighlights.map((item) => (
                                                <div key={item.label} className="rounded-[18px] border border-cyan-300/10 bg-white/5 p-3">
                                                    <div className="mono text-[10px] uppercase tracking-[0.18em] text-slate-400">{item.label}</div>
                                                    <div className={`mt-2 text-lg font-bold tracking-[-0.03em] ${item.accent}`}>{item.value}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="surface-card">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Device Group</div>
                                        <div className="mt-3 grid gap-2">
                                            {groupedActions.device.slice(0, 2).map((action) => (
                                                <button key={action.label} onClick={() => sendMessage(action.cmd)} className="app-pill">
                                                    <div className="text-sm font-bold text-white">{action.label}</div>
                                                    <div className="mt-1 text-xs text-slate-400">{action.hint}</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="surface-card">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-amber-200">Utility Group</div>
                                        <div className="mt-3 grid gap-2">
                                            {groupedActions.utility.slice(0, 2).map((action) => (
                                                <button key={action.label} onClick={() => sendMessage(action.cmd)} className="app-pill">
                                                    <div className="text-sm font-bold text-white">{action.label}</div>
                                                    <div className="mt-1 text-xs text-slate-400">{action.hint}</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="surface-card wide">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Suggested Ops</div>
                                        <div className="mt-3 grid gap-2">
                                            <button onClick={() => sendMessage("what time is it in utc")} className="app-pill">
                                                <div className="text-sm font-bold text-white">Sync Time Layer</div>
                                                <div className="mt-1 text-xs text-slate-400">Check current UTC context for the runtime.</div>
                                            </button>
                                            <button onClick={() => sendMessage("battery")} className="app-pill">
                                                <div className="text-sm font-bold text-white">Inspect Device Power</div>
                                                <div className="mt-1 text-xs text-slate-400">Pull a fresh battery snapshot without leaving the launcher surface.</div>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                        <section className="glass-panel rounded-[28px] p-4 stagger-3">
                            <div className="flex items-center justify-between">
                                <div>
                                    <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Conversation</div>
                                    <div className="mt-2 text-lg font-bold tracking-[-0.03em] text-white">Control Stream</div>
                                </div>
                                <div className="mono text-[11px] uppercase tracking-[0.16em] text-slate-400">{messages.length - 1} turns</div>
                            </div>

                            <main className={`chat-container mt-4 ${surfaceMode === "home" ? "opacity-75" : ""}`}>
                                {messages.map((m, i) => (
                                    <div key={i}>
                                        {m.user && (
                                            <div className="message-bubble user-bubble text-sm font-medium">
                                                {m.user}
                                            </div>
                                        )}
                                        <div className="message-bubble assistant-bubble text-sm whitespace-pre-wrap">
                                            {m.assistant}
                                        </div>
                                        {showTrace && m.traceSummary && m.traceSummary.length > 0 && (
                                            <div className="trace-panel mb-3 p-3 text-xs text-amber-50">
                                                <div className="flex items-start justify-between gap-3">
                                                    <div>
                                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-amber-200">Trace Summary</div>
                                                        <div className="mt-2 flex flex-wrap gap-2">
                                                            <span className="chip mono text-[10px] text-white">Mode: {m.mode || "agentic"}</span>
                                                            <span className="chip mono text-[10px] text-white">Route: {getTraceMeta(m).route}</span>
                                                            {getTraceMeta(m).family && (
                                                                <span className="chip mono text-[10px] text-white">Family: {getTraceMeta(m).family}</span>
                                                            )}
                                                            {getTraceMeta(m).deterministic && (
                                                                <span className="chip mono text-[10px] text-emerald-100" style={{ background: "rgba(124, 242, 154, 0.12)", borderColor: "rgba(124, 242, 154, 0.22)" }}>
                                                                    Deterministic
                                                                </span>
                                                            )}
                                                        </div>
                                                        {m.requestDurationMs !== null && (
                                                            <div className="mt-3 mono text-[11px] uppercase tracking-[0.16em] text-amber-100/85">
                                                                Request Duration: {m.requestDurationMs}ms
                                                            </div>
                                                        )}
                                                    </div>
                                                    {visibleTrace(m.trace).length > 0 && (
                                                        <button
                                                            onClick={() => toggleRawTrace(i)}
                                                            className="chip mono text-[10px] text-amber-50"
                                                        >
                                                            {m.showRawTrace ? "Hide Raw Trace" : "Show Raw Trace"}
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="mt-3 space-y-1.5 text-[12px] leading-5 text-amber-50/90">
                                                    {m.traceSummary.map((line, idx) => (
                                                        <div key={idx} className="whitespace-pre-wrap">{line}</div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {showTrace && m.showRawTrace && visibleTrace(m.trace).length > 0 && (
                                            <div className="raw-trace mb-4 p-3 text-xs text-slate-200">
                                                <div className="mb-3 flex items-center justify-between mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">
                                                    <span>{m.mode || "agentic"} trace</span>
                                                    <span>{m.requestId || "local"}</span>
                                                </div>
                                                <div className="space-y-2">
                                                    {visibleTrace(m.trace).map((item, idx) => (
                                                        <pre key={idx} className="overflow-x-auto rounded-2xl border border-cyan-300/12 bg-slate-950/70 p-3 whitespace-pre-wrap">{JSON.stringify(item, null, 2)}</pre>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                <div ref={chatEndRef}></div>
                            </main>
                        </section>

                        <div className="launcher-rail">
                            <button onClick={() => toggleSheet("status")} className="rail-button">
                                <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Status</div>
                                <div className="mt-2 text-sm font-bold text-white">System Sheet</div>
                                <div className="mt-1 text-xs text-slate-400">{status.actor_online ? "Runtime online" : "Offline"}</div>
                            </button>
                            <button onClick={() => toggleSheet("actions")} className="rail-button">
                                <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Launch</div>
                                <div className="mt-2 text-sm font-bold text-white">Command Deck</div>
                                <div className="mt-1 text-xs text-slate-400">Grouped actions and utilities</div>
                            </button>
                            <button onClick={() => toggleSheet("debug")} className="rail-button">
                                <div className="mono text-[10px] uppercase tracking-[0.22em] text-amber-200">Debug</div>
                                <div className="mt-2 text-sm font-bold text-white">Operator Sheet</div>
                                <div className="mt-1 text-xs text-slate-400">{showTrace ? "Trace visible" : "Trace hidden"}</div>
                            </button>
                        </div>

                        {activeSheet && <div className="sheet-scrim" onClick={() => setActiveSheet(null)}></div>}

                        {activeSheet === "status" && (
                            <section className="bottom-sheet">
                                <div className="sheet-handle"></div>
                                <div className="flex items-center justify-between">
                                    <div>
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Status Drawer</div>
                                        <div className="mt-2 text-xl font-bold tracking-[-0.03em] text-white">System Sheet</div>
                                    </div>
                                    <button onClick={() => setActiveSheet(null)} className="chip mono text-[10px] text-white">Close</button>
                                </div>
                                <div className="sheet-grid mt-4">
                                    <div className="sheet-card">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Mission Feed</div>
                                        <div className="mt-3 text-2xl font-bold tracking-[-0.03em] text-white">
                                            {lastMessage?.mode === "pending" ? "Running request" : "Ready for next task"}
                                        </div>
                                        <div className="mt-2 text-sm leading-6 text-slate-300">
                                            {loading ? "The runtime is processing the current turn." : "Fast paths, deterministic tools, and agentic traces are live."}
                                        </div>
                                    </div>
                                    <div className="sheet-card">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-amber-200">Engine Deck</div>
                                        <div className="mt-3 text-base font-bold text-white">{status.actor_model}</div>
                                        <div className="mt-2 mono text-[11px] uppercase tracking-[0.16em] text-slate-400">
                                            {showTrace ? "Trace Visible" : "Trace Hidden"}
                                        </div>
                                        <div className="mt-3 chip mono text-[10px] text-white">
                                            {status.actor_online ? "Local Runtime Ready" : "Engine Offline"}
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                        {activeSheet === "actions" && (
                            <section className="bottom-sheet">
                                <div className="sheet-handle"></div>
                                <div className="flex items-center justify-between">
                                    <div>
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Quick Launch</div>
                                        <div className="mt-2 text-xl font-bold tracking-[-0.03em] text-white">Command Deck</div>
                                    </div>
                                    <button onClick={() => setActiveSheet(null)} className="chip mono text-[10px] text-white">Close</button>
                                </div>
                                <div className="mt-4 grid grid-cols-2 gap-3">
                                    <div className="col-span-2">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Device Actions</div>
                                        <div className="mt-3 grid grid-cols-2 gap-3">
                                            {groupedActions.device.map((action, i) => (
                                                <button
                                                    key={i}
                                                    onClick={() => {
                                                        sendMessage(action.cmd);
                                                        setActiveSheet(null);
                                                    }}
                                                    className="action-card min-w-0"
                                                >
                                                    <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">{action.glyph}</div>
                                                    <div className="mt-3 text-base font-bold tracking-[-0.03em] text-white">{action.label}</div>
                                                    <div className="mt-1 text-xs text-slate-400">{action.hint}</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="col-span-2 mt-2">
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-amber-200">Utility Actions</div>
                                        <div className="mt-3 grid grid-cols-2 gap-3">
                                            {groupedActions.utility.map((action, i) => (
                                                <button
                                                    key={i}
                                                    onClick={() => {
                                                        sendMessage(action.cmd);
                                                        setActiveSheet(null);
                                                    }}
                                                    className="action-card min-w-0"
                                                >
                                                    <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">{action.glyph}</div>
                                                    <div className="mt-3 text-base font-bold tracking-[-0.03em] text-white">{action.label}</div>
                                                    <div className="mt-1 text-xs text-slate-400">{action.hint}</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                        {activeSheet === "debug" && (
                            <section className="bottom-sheet">
                                <div className="sheet-handle"></div>
                                <div className="flex items-center justify-between">
                                    <div>
                                        <div className="mono text-[10px] uppercase tracking-[0.22em] text-amber-200">Operator Controls</div>
                                        <div className="mt-2 text-xl font-bold tracking-[-0.03em] text-white">Debug Drawer</div>
                                    </div>
                                    <button onClick={() => setActiveSheet(null)} className="chip mono text-[10px] text-white">Close</button>
                                </div>
                                <div className="mt-4 flex flex-col gap-3">
                                    <button
                                        onClick={() => setShowTrace(prev => !prev)}
                                        className="chip mono text-[10px] text-white justify-center"
                                    >
                                        {showTrace ? "Hide Debug" : "Show Debug"}
                                    </button>
                                    <select
                                        value={traceFilter}
                                        onChange={(e) => setTraceFilter(e.target.value)}
                                        className="mono rounded-full border border-cyan-300/20 bg-slate-950/60 px-3 py-3 text-[10px] uppercase tracking-[0.16em] text-slate-200 outline-none"
                                    >
                                        <option value="all">All</option>
                                        <option value="request">Request</option>
                                        <option value="fast_path_tool">Fast Path</option>
                                        <option value="fast_path_search">Fast Search</option>
                                        <option value="state_transition">State</option>
                                        <option value="runtime_budget">Budget</option>
                                        <option value="actor">Actor</option>
                                        <option value="tool_parse">Tool Parse</option>
                                        <option value="critic">Critic</option>
                                        <option value="tool_execution">Tool Exec</option>
                                        <option value="direct_fallback">Fallback</option>
                                        <option value="answer_cleanup">Cleanup</option>
                                        <option value="exception">Exception</option>
                                    </select>
                                </div>
                            </section>
                        )}

                        <footer className="command-bar p-3">
                            <div className="mb-3 flex items-center justify-between px-2">
                                <div>
                                    <div className="mono text-[10px] uppercase tracking-[0.22em] text-cyan-200">Command Uplink</div>
                                    <div className="mt-1 text-sm text-slate-300">Issue a direct device command or ask the local agent.</div>
                                </div>
                                <div className="chip mono text-[10px] text-white">{loading ? "Busy" : "Idle"}</div>
                            </div>
                            <div className="flex items-center gap-2 rounded-[22px] border border-cyan-300/12 bg-slate-950/60 p-2">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => e.key === "Enter" && sendMessage()}
                                    placeholder="Command your phone, ask a question, or inspect the runtime..."
                                    className="flex-1 bg-transparent px-4 py-3 text-sm text-white outline-none placeholder:text-slate-500"
                                    disabled={loading}
                                />
                                <button
                                    onClick={() => sendMessage()}
                                    className="send-button rounded-[18px] px-4 py-3 text-sm font-bold tracking-[-0.02em] transition-transform active:scale-95"
                                    disabled={loading || !input.trim()}
                                >
                                    Send
                                </button>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
